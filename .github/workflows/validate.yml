name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile desktop sources
        run: python -m py_compile main.py snake_game\__init__.py snake_game\game.py snake_game\constants.py snake_game\helpers.py snake_game\bootstrap.py

      - name: Run smoke test
        run: python scripts/smoke_test.py

      - name: Check browser scripts
        shell: pwsh
        run: |
          node --check docs/game.js
          Get-ChildItem docs/js -Filter *.js | ForEach-Object { node --check $_.FullName }
